name: Generate Post Index

on:
  push:
    branches: ["main"]
    paths:
      - "Content/posts/**"
      - "scripts/generate_post_index.py"
      - ".github/workflows/generate-post-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate index
        run: python scripts/generate_post_index.py

      - name: Commit index changes
        run: |
          if git diff --quiet -- Content/posts/index.json; then
            echo "No changes to Content/posts/index.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Content/posts/index.json
          git commit -m "chore(content): update generated post index"
          git push
