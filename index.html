  <meta http-equiv="refresh" content="0; url=/pages/desktop/index.html">
  <title>Redirecting...</title>

    (function () {
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      window.location.replace(isMobile ? '/pages/mobile/index.html' : '/pages/desktop/index.html');
    })();
  </script>
</head>
