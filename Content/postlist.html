<!DOCTYPE html>
<html>
<head>
    <title>List of Posts</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" type="text/css" href="/assets/css/content.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/base.css">
</head>
<body>
<header></header>
<nav></nav>

<main id="posts-page">
    <section class="posts-toolbar">
        <input id="search-input" type="search" placeholder="Search posts..." aria-label="Search posts">
        <select id="sorting-select" aria-label="Sort posts">
            <option value="date" selected>Sort by Date</option>
            <option value="name">Sort by Name</option>
        </select>
    </section>

    <p id="post-list-state" class="posts-state">Loading posts...</p>

    <section id="post-list" aria-live="polite">
        <!-- Post cards are rendered by JavaScript -->
    </section>
</main>

<footer></footer>
<script src="/assets/js/content-legacy.js"></script>
<script src="/assets/js/layout.js"></script>
</body>
</html>
